name: Publish Go SDK to pkg.go.dev

on:
  release:
    types: [published]

jobs:
  publish:
    name: Tag and push Go module
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Verify module
        working-directory: sdk-go
        run: |
          go mod tidy
          go vet ./...
          go build ./...

      - name: Push SDK-specific tag for pkg.go.dev
        # pkg.go.dev discovers modules from tagged releases.
        # The Go proxy picks up the module automatically after the tag is pushed.
        run: |
          TAG="${{ github.event.release.tag_name }}"
          git tag "sdk-go/${TAG}"
          git push origin "sdk-go/${TAG}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

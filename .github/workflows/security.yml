name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    # Run every day at 01:00 UTC
    - cron: '0 1 * * *'

jobs:
  rust-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet
      - name: Audit workspace
        run: cargo audit

  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    name: Container Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t sentinelmark-api:scan .

      - name: Run Trivy on API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sentinelmark-api:scan
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

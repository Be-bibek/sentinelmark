<text x="505" y="225" text-anchor="middle" fill="#ffffff" style="font-family:sans-serif;font-size:12px;">Subtle crate + Zeroize bindings</text>

<!-- Row 3: Forensic Survivability -->
<text x="40" y="290" style="fill:#666;font-family:sans-serif;font-size:14px;font-weight:600;">Forensic Integrity</text>

<rect x="40" y="305" width="120" height="35" rx="4" fill="url(#grad_red)" stroke="#A32D2D" stroke-width="1.5"/>
<text x="100" y="320" text-anchor="middle" fill="white" style="font-family:sans-serif;font-size:14px;font-weight:600;">Timestamp Only</text>
<text x="100" y="335" text-anchor="middle" fill="white" style="font-family:sans-serif;font-size:11px;">Reorderable</text>
<line x1="160" y1="322" x2="200" y2="322" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5"/>

<rect x="220" y="305" width="120" height="35" rx="4" fill="url(#grad_blue)" stroke="#185FA5" stroke-width="1.5"/>
<text x="280" y="320" text-anchor="middle" fill="white" style="font-family:sans-serif;font-size:14px;font-weight:600;">Blockchain</text>
<text x="280" y="335" text-anchor="middle" fill="white" style="font-family:sans-serif;font-size:11px;">High overhead</text>
<line x1="340" y1="322" x2="380" y2="322" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5"/>

<rect x="400" y="295" width="250" height="55" rx="6" fill="url(#grad_green)" stroke="#3B6D11" stroke-width="2.5"/>
<text x="525" y="315" text-anchor="middle" fill="#ffffff" style="font-family:sans-serif;font-size:14px;font-weight:600;">Monotonic Hash Chains</text>
<text x="525" y="335" text-anchor="middle" fill="#ffffff" style="font-family:sans-serif;font-size:12px;">Causal order + Replay limits</text>

<!-- Row 4: Implementation Quality -->
<text x="40" y="400" style="fill:#666;font-family:sans-serif;font-size:14px;font-weight:600;">Security Implementation</text>

<rect x="40" y="415" width="80" height="35" rx="4" fill="url(#grad_red)" stroke="#A32D2D" stroke-width="1.5"/>
<text x="80" y="430" text-anchor="middle" fill="white" style="font-family:sans-serif;font-size:14px;font-weight:600;">C/C++</text>
<text x="80" y="445" text-anchor="middle" fill="white" style="font-family:sans-serif;font-size:11px;">Buffer bugs</text>
<line x1="120" y1="432" x2="160" y2="432" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5"/>

<rect x="180" y="415" width="80" height="35" rx="4" fill="url(#grad_amber)" stroke="#BA7517" stroke-width="1.5"/>
<text x="220" y="430" text-anchor="middle" fill="white" style="font-family:sans-serif;font-size:14px;font-weight:600;">Python</text>
<text x="220" y="445" text-anchor="middle" fill="white" style="font-family:sans-serif;font-size:11px;">Slow crypto</text>
<line x1="260" y1="432" x2="300" y2="432" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5"/>

<rect x="320" y="405" width="330" height="55" rx="6" fill="url(#grad_green)" stroke="#3B6D11" stroke-width="2.5"/>
<text x="485" y="425" text-anchor="middle" fill="#ffffff" style="font-family:sans-serif;font-size:14px;font-weight:600;">Memory-Safe Rust</text>
<text x="485" y="445" text-anchor="middle" fill="#ffffff" style="font-family:sans-serif;font-size:12px;">Zero-copy serde, safe FFI bindings</text>


<svg width="100%" viewBox="0 0 706.29 625" role="img" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">SentinelMark research novelty vs existing work</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Comparison showing SentinelMark's unique positioning in cryptographic watermarking, side-channel resilience, and behavioral entropy</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#9C9A92" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<linearGradient id="grad_green" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#97C459"/>
<stop offset="100%" stop-color="#639922"/>
</linearGradient>
<linearGradient id="grad_amber" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#EF9F27"/>
<stop offset="100%" stop-color="#BA7517"/>
</linearGradient>
<linearGradient id="grad_blue" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#85B7EB"/>
<stop offset="100%" stop-color="#185FA5"/>
</linearGradient>
<linearGradient id="grad_red" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#F09595"/>
<stop offset="100%" stop-color="#A32D2D"/>
</linearGradient>
</defs>

<!-- Background -->
<rect width="100%" height="100%" fill="#ffffff" rx="10"/>

<!-- Title -->
<text x="353" y="40" text-anchor="middle" style="fill:#333;font-family:sans-serif;font-size:18px;font-weight:600;">SentinelMark: Research Novelty Assessment</text>

<!-- Row 1: Watermarking Approach -->
<text x="40" y="80" style="fill:#666;font-family:sans-serif;font-size:14px;font-weight:600;">Watermarking Model</text>

<rect x="40" y="95" width="140" height="30" rx="4" fill="#f0f0f0" stroke="#999"/>
<text x="110" y="115" text-anchor="middle" style="fill:#333;font-family:sans-serif;font-size:12px;">Static Key WM</text>
<line x1="180" y1="110" x2="210" y2="110" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5"/>

<rect x="220" y="95" width="140" height="30" rx="4" fill="#e8e8e8" stroke="#999"/>
<text x="290" y="115" text-anchor="middle" style="fill:#333;font-family:sans-serif;font-size:12px;">Crypto-only logs</text>
<line x1="360" y1="110" x2="390" y2="110" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5"/>

<rect x="400" y="85" width="250" height="50" rx="6" fill="url(#grad_green)" stroke="#3B6D11" stroke-width="2.5"/>
<text x="525" y="105" text-anchor="middle" fill="#ffffff" style="font-family:sans-serif;font-size:14px;font-weight:600;">Behavior-Entangled WM</text>
<text x="525" y="123" text-anchor="middle" fill="#ffffff" style="font-family:sans-serif;font-size:12px;">Dynamic key = f(device state, secrets)</text>

<circle cx="680" cy="110" r="14" fill="#E43716"/>
<text x="680" y="114" text-anchor="middle" fill="white" style="font-family:sans-serif;font-size:10px;font-weight:bold;">NEW</text>

<!-- Row 2: Side-Channel Resilience -->
<text x="40" y="180" style="fill:#666;font-family:sans-serif;font-size:14px;font-weight:600;">Side-Channel Defense</text>

<rect x="40" y="195" width="110" height="35" rx="4" fill="url(#grad_red)" stroke="#A32D2D" stroke-width="1.5"/>
<text x="95" y="210" text-anchor="middle" fill="white" style="font-family:sans-serif;font-size:14px;font-weight:600;">C/C++ impl</text>
<text x="95" y="225" text-anchor="middle" fill="white" style="font-family:sans-serif;font-size:11px;">Timing leaks</text>
<line x1="150" y1="212" x2="190" y2="212" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5"/>

<rect x="200" y="195" width="110" height="35" rx="4" fill="url(#grad_amber)" stroke="#BA7517" stroke-width="1.5"/>
<text x="255" y="210" text-anchor="middle" fill="white" style="font-family:sans-serif;font-size:14px;font-weight:600;">Rust (naive)</text>
<text x="255" y="225" text-anchor="middle" fill="white" style="font-family:sans-serif;font-size:11px;">Variable time</text>
<line x1="310" y1="212" x2="350" y2="212" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5"/>

<rect x="360" y="185" width="290" height="55" rx="6" fill="url(#grad_green)" stroke="#3B6D11" stroke-width="2.5"/>

<svg width="800" height="650" viewBox="0 0 800 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="layer1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a2e2e" />
      <stop offset="100%" stop-color="#7a3e3e" />
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b3355" />
      <stop offset="100%" stop-color="#4c436f" />
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e4d3b" />
      <stop offset="100%" stop-color="#2a6d54" />
    </linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#805615" />
      <stop offset="100%" stop-color="#b3781e" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" rx="10"/>
  
  <text x="400" y="40" text-anchor="middle" style="font-family:sans-serif;font-size:20px;font-weight:bold;fill:#333;">SentinelMark Pipeline Architecture</text>

  <!-- Layer 1 -->
  <rect x="50" y="70" width="700" height="100" rx="8" fill="url(#layer1)" />
  <text x="70" y="95" style="font-family:sans-serif;font-size:16px;font-weight:bold;fill:#fff;">Layer 1 — Edge Sentinel (Rust Core)</text>
  
  <rect x="80" y="110" width="200" height="45" rx="6" fill="#333" />
  <text x="180" y="130" text-anchor="middle" style="font-family:sans-serif;font-size:14px;font-weight:bold;fill:#fff;">Event Capture</text>
  <text x="180" y="145" text-anchor="middle" style="font-family:sans-serif;font-size:11px;fill:#bbb;">Telemetry pre-image struct</text>

  <rect x="300" y="110" width="200" height="45" rx="6" fill="#333" />
  <text x="400" y="130" text-anchor="middle" style="font-family:sans-serif;font-size:14px;font-weight:bold;fill:#fff;">Behavioral State</text>
  <text x="400" y="145" text-anchor="middle" style="font-family:sans-serif;font-size:11px;fill:#bbb;">CPU timing, memory entropy</text>

  <rect x="520" y="110" width="200" height="45" rx="6" fill="#333" />
  <text x="620" y="130" text-anchor="middle" style="font-family:sans-serif;font-size:14px;font-weight:bold;fill:#fff;">Constant-Time Crypto</text>
  <text x="620" y="145" text-anchor="middle" style="font-family:sans-serif;font-size:11px;fill:#bbb;">Ring + Zeroize bindings</text>

  <line x1="400" y1="170" x2="400" y2="200" stroke="#888" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Layer 2 -->
  <rect x="50" y="210" width="700" height="100" rx="8" fill="url(#layer2)" />
  <text x="70" y="235" style="font-family:sans-serif;font-size:16px;font-weight:bold;fill:#fff;">Layer 2 — Adaptive Watermark Engine (Core Novelty)</text>
  
  <rect x="80" y="250" width="200" height="45" rx="6" fill="#333" />
  <text x="180" y="270" text-anchor="middle" style="font-family:sans-serif;font-size:14px;font-weight:bold;fill:#fff;">Behavior-Entangled Key</text>
  <text x="180" y="285" text-anchor="middle" style="font-family:sans-serif;font-size:11px;fill:#bbb;">HKDF-SHA256(state, K_static)</text>

  <rect x="300" y="250" width="200" height="45" rx="6" fill="#333" />
  <text x="400" y="270" text-anchor="middle" style="font-family:sans-serif;font-size:14px;font-weight:bold;fill:#fff;">Dual-Serialization</text>
  <text x="400" y="285" text-anchor="middle" style="font-family:sans-serif;font-size:11px;fill:#bbb;">Canonical JSON + rkyv</text>

  <rect x="520" y="250" width="200" height="45" rx="6" fill="#333" />
  <text x="620" y="270" text-anchor="middle" style="font-family:sans-serif;font-size:14px;font-weight:bold;fill:#fff;">Watermark Embed</text>
  <text x="620" y="285" text-anchor="middle" style="font-family:sans-serif;font-size:11px;fill:#bbb;">Immutable byte arrays</text>

  <line x1="400" y1="310" x2="400" y2="340" stroke="#888" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Layer 3 -->
  <rect x="50" y="350" width="700" height="100" rx="8" fill="url(#layer3)" />
  <text x="70" y="375" style="font-family:sans-serif;font-size:16px;font-weight:bold;fill:#fff;">Layer 3 — Forensic Causal Chain</text>
  
  <rect x="80" y="390" width="200" height="45" rx="6" fill="#333" />
  <text x="180" y="410" text-anchor="middle" style="font-family:sans-serif;font-size:14px;font-weight:bold;fill:#fff;">Chain Linkage</text>
  <text x="180" y="425" text-anchor="middle" style="font-family:sans-serif;font-size:11px;fill:#bbb;">H(prev_hash, W, event)</text>

  <rect x="300" y="390" width="200" height="45" rx="6" fill="#333" />
  <text x="400" y="410" text-anchor="middle" style="font-family:sans-serif;font-size:14px;font-weight:bold;fill:#fff;">Monotonic Sequence</text>
  <text x="400" y="425" text-anchor="middle" style="font-family:sans-serif;font-size:11px;fill:#bbb;">Distributed ordering solution</text>

  <rect x="520" y="390" width="200" height="45" rx="6" fill="#333" />
  <text x="620" y="410" text-anchor="middle" style="font-family:sans-serif;font-size:14px;font-weight:bold;fill:#fff;">Replay Guard</text>
  <text x="620" y="425" text-anchor="middle" style="font-family:sans-serif;font-size:11px;fill:#bbb;">60s window + 256-bit nonce</text>

  <line x1="400" y1="450" x2="400" y2="480" stroke="#888" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Layer 4 -->
  <rect x="50" y="490" width="700" height="100" rx="8" fill="url(#layer4)" />
  <text x="70" y="515" style="font-family:sans-serif;font-size:16px;font-weight:bold;fill:#fff;">Layer 4 — Stateful Verification Authority (Python)</text>
  
  <rect x="80" y="530" width="200" height="45" rx="6" fill="#333" />
  <text x="180" y="550" text-anchor="middle" style="font-family:sans-serif;font-size:14px;font-weight:bold;fill:#fff;">Chain &amp; HMAC Verify</text>
  <text x="180" y="565" text-anchor="middle" style="font-family:sans-serif;font-size:11px;fill:#bbb;">OpenSSL hmac.compare_digest</text>

  <rect x="300" y="530" width="200" height="45" rx="6" fill="#333" />
  <text x="400" y="550" text-anchor="middle" style="font-family:sans-serif;font-size:14px;font-weight:bold;fill:#fff;">Anomaly Detection</text>
  <text x="400" y="565" text-anchor="middle" style="font-family:sans-serif;font-size:11px;fill:#bbb;">Z-Score entropy collapse model</text>

  <rect x="520" y="530" width="200" height="45" rx="6" fill="#333" />
  <text x="620" y="550" text-anchor="middle" style="font-family:sans-serif;font-size:14px;font-weight:bold;fill:#fff;">Ledger Persistence</text>
  <text x="620" y="565" text-anchor="middle" style="font-family:sans-serif;font-size:11px;fill:#bbb;">Normalized SQLite WAL Database</text>

</svg>

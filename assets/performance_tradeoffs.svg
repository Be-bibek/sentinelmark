<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90E2" />
      <stop offset="100%" stop-color="#357ABD" />
    </linearGradient>
    <linearGradient id="barRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E74C3C" />
      <stop offset="100%" stop-color="#C0392B" />
    </linearGradient>
    <linearGradient id="barGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ECC71" />
      <stop offset="100%" stop-color="#27AE60" />
    </linearGradient>
    <linearGradient id="barOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F39C12" />
      <stop offset="100%" stop-color="#D68910" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" rx="10"/>

  <text x="400" y="40" text-anchor="middle" style="font-family:sans-serif;font-size:20px;font-weight:bold;fill:#333;">Rust vs C++ vs Python: Performance &amp; Safety Trade-offs</text>

  <!-- Section 1: Latency -->
  <text x="50" y="90" style="font-family:sans-serif;font-size:16px;font-weight:bold;fill:#555;">Single Watermark Derivation Latency (μs)</text>
  <line x1="50" y1="110" x2="50" y2="210" stroke="#ccc" stroke-width="2" />
  <line x1="50" y1="210" x2="400" y2="210" stroke="#ccc" stroke-width="2" />
  
  <text x="40" y="120" text-anchor="end" style="font-family:sans-serif;font-size:12px;fill:#666;">400μs</text>
  <text x="40" y="210" text-anchor="end" style="font-family:sans-serif;font-size:12px;fill:#666;">0μs</text>

  <rect x="80" y="198" width="60" height="11" fill="url(#barBlue)" />
  <text x="110" y="190" text-anchor="middle" style="font-family:sans-serif;font-size:12px;font-weight:bold;fill:#333;">45μs</text>
  <text x="110" y="230" text-anchor="middle" style="font-family:sans-serif;font-size:14px;fill:#555;">C++ (raw)</text>

  <rect x="180" y="196" width="60" height="13" fill="url(#barRed)" />
  <text x="210" y="188" text-anchor="middle" style="font-family:sans-serif;font-size:12px;font-weight:bold;fill:#333;">52μs</text>
  <text x="210" y="230" text-anchor="middle" style="font-family:sans-serif;font-size:14px;fill:#555;">Rust CT</text>

  <rect x="280" y="115" width="60" height="94" fill="url(#barGreen)" />
  <text x="310" y="107" text-anchor="middle" style="font-family:sans-serif;font-size:12px;font-weight:bold;fill:#333;">380μs</text>
  <text x="310" y="230" text-anchor="middle" style="font-family:sans-serif;font-size:14px;fill:#555;">Python</text>

  <text x="420" y="160" style="font-family:sans-serif;font-size:14px;fill:#666;font-style:italic;">Rust adds ~15% overhead for constant-time.</text>
  <text x="420" y="180" style="font-family:sans-serif;font-size:14px;fill:#666;font-style:italic;">7.3x faster than Python.</text>

  <!-- Section 2: Memory -->
  <text x="50" y="280" style="font-family:sans-serif;font-size:16px;font-weight:bold;fill:#555;">Per-Event Memory Footprint</text>
  
  <rect x="80" y="310" width="60" height="40" fill="url(#barBlue)" rx="4" />
  <text x="110" y="335" text-anchor="middle" style="font-family:sans-serif;font-size:14px;font-weight:bold;fill:#fff;">8KB</text>
  <text x="110" y="370" text-anchor="middle" style="font-family:sans-serif;font-size:14px;fill:#555;">C++</text>

  <rect x="180" y="300" width="60" height="50" fill="url(#barRed)" rx="4" />
  <text x="210" y="325" text-anchor="middle" style="font-family:sans-serif;font-size:14px;font-weight:bold;fill:#fff;">10KB</text>
  <text x="210" y="370" text-anchor="middle" style="font-family:sans-serif;font-size:14px;fill:#555;">Rust</text>

  <rect x="280" y="290" width="60" height="60" fill="url(#barGreen)" rx="4" />
  <text x="310" y="315" text-anchor="middle" style="font-family:sans-serif;font-size:14px;font-weight:bold;fill:#fff;">14KB</text>
  <text x="310" y="370" text-anchor="middle" style="font-family:sans-serif;font-size:14px;fill:#555;">Python</text>

  <text x="420" y="325" style="font-family:sans-serif;font-size:14px;fill:#666;font-style:italic;">Rust uses 25% more than unsafe C++,</text>
  <text x="420" y="345" style="font-family:sans-serif;font-size:14px;fill:#666;font-style:italic;">but includes automatic cryptographic zeroization.</text>

  <!-- Section 3: Safety Table -->
  <text x="50" y="420" style="font-family:sans-serif;font-size:16px;font-weight:bold;fill:#555;">Security &amp; Safety Properties</text>

  <rect x="50" y="435" width="700" height="25" fill="#333" />
  <text x="130" y="452" text-anchor="middle" fill="#fff" style="font-family:sans-serif;font-size:13px;font-weight:bold;">Property</text>
  <text x="325" y="452" text-anchor="middle" fill="#fff" style="font-family:sans-serif;font-size:13px;font-weight:bold;">C++</text>
  <text x="500" y="452" text-anchor="middle" fill="#fff" style="font-family:sans-serif;font-size:13px;font-weight:bold;">Rust</text>
  <text x="665" y="452" text-anchor="middle" fill="#fff" style="font-family:sans-serif;font-size:13px;font-weight:bold;">Python</text>

  <!-- Row 1 -->
  <rect x="50" y="460" width="700" height="22" fill="#f8f9fa" />
  <text x="55" y="475" fill="#333" style="font-family:sans-serif;font-size:12px;">Buffer Overflow Risk</text>
  <rect x="250" y="460" width="150" height="22" fill="#f8d7da" />
  <text x="325" y="475" text-anchor="middle" fill="#721c24" style="font-family:sans-serif;font-size:12px;">High Risk</text>
  <rect x="400" y="460" width="200" height="22" fill="#d4edda" />
  <text x="500" y="475" text-anchor="middle" fill="#155724" style="font-family:sans-serif;font-size:12px;font-weight:bold;">Prevented (Safe)</text>
  <rect x="600" y="460" width="150" height="22" fill="#d4edda" />
  <text x="665" y="475" text-anchor="middle" fill="#155724" style="font-family:sans-serif;font-size:12px;">Not applicable</text>

  <!-- Row 2 -->
  <rect x="50" y="482" width="700" height="22" fill="#ffffff" />
  <text x="55" y="497" fill="#333" style="font-family:sans-serif;font-size:12px;">Timing Leakage</text>
  <rect x="250" y="482" width="150" height="22" fill="#f8d7da" />
  <text x="325" y="497" text-anchor="middle" fill="#721c24" style="font-family:sans-serif;font-size:12px;">Variable Time</text>
  <rect x="400" y="482" width="200" height="22" fill="#fff3cd" />
  <text x="500" y="497" text-anchor="middle" fill="#856404" style="font-family:sans-serif;font-size:12px;font-weight:bold;">CT Hardened</text>
  <rect x="600" y="482" width="150" height="22" fill="#fff3cd" />
  <text x="665" y="497" text-anchor="middle" fill="#856404" style="font-family:sans-serif;font-size:12px;">Possible (GIL)</text>

  <!-- Row 3 -->
  <rect x="50" y="504" width="700" height="22" fill="#f8f9fa" />
  <text x="55" y="519" fill="#333" style="font-family:sans-serif;font-size:12px;">Automatic Secret Erasure</text>
  <rect x="250" y="504" width="150" height="22" fill="#f8d7da" />
  <text x="325" y="519" text-anchor="middle" fill="#721c24" style="font-family:sans-serif;font-size:12px;">Manual only</text>
  <rect x="400" y="504" width="200" height="22" fill="#d4edda" />
  <text x="500" y="519" text-anchor="middle" fill="#155724" style="font-family:sans-serif;font-size:12px;font-weight:bold;">Via Drop/Zeroize</text>
  <rect x="600" y="504" width="150" height="22" fill="#f8d7da" />
  <text x="665" y="519" text-anchor="middle" fill="#721c24" style="font-family:sans-serif;font-size:12px;">Requires care</text>

  <!-- Row 4 -->
  <rect x="50" y="526" width="700" height="22" fill="#ffffff" />
  <text x="55" y="541" fill="#333" style="font-family:sans-serif;font-size:12px;">Thread Safety Guarantees</text>
  <rect x="250" y="526" width="150" height="22" fill="#f8d7da" />
  <text x="325" y="541" text-anchor="middle" fill="#721c24" style="font-family:sans-serif;font-size:12px;">Programmer Error</text>
  <rect x="400" y="526" width="200" height="22" fill="#d4edda" />
  <text x="500" y="541" text-anchor="middle" fill="#155724" style="font-family:sans-serif;font-size:12px;font-weight:bold;">Compile-Time (Send/Sync)</text>
  <rect x="600" y="526" width="150" height="22" fill="#fff3cd" />
  <text x="665" y="541" text-anchor="middle" fill="#856404" style="font-family:sans-serif;font-size:12px;">GIL provides safety</text>

  <rect x="50" y="460" width="700" height="88" fill="none" stroke="#ccc" stroke-width="1" />
  <line x1="250" y1="435" x2="250" y2="548" stroke="#ccc" stroke-width="1" />
  <line x1="400" y1="435" x2="400" y2="548" stroke="#ccc" stroke-width="1" />
  <line x1="600" y1="435" x2="600" y2="548" stroke="#ccc" stroke-width="1" />

  <text x="400" y="580" text-anchor="middle" style="font-family:sans-serif;font-size:14px;font-weight:bold;fill:#27AE60;">SentinelMark utilizes Rust's guarantees without sacrificing bare-metal speeds.</text>
</svg>

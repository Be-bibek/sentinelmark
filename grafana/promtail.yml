server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: sentinelmark-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: sentinelmark-api
          __path__: /var/lib/docker/containers/*/*.log

  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/*.log
